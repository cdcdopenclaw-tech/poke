<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>稻羽日常 · 角色生活模拟</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Segoe UI","PingFang SC",sans-serif;background:#1a1a2e;color:#ddd;min-height:100vh;display:flex}
#sidebar{width:264px;background:#16213e;padding:14px;display:flex;flex-direction:column;gap:7px;flex-shrink:0;overflow-y:auto;max-height:100vh}
#sidebar h2{font-size:1rem;color:#e94560;border-bottom:1px solid #233;padding-bottom:8px;margin-bottom:2px}
.char-card{background:#0f3460;border-radius:8px;padding:8px 10px;cursor:pointer;transition:all .15s;border:2px solid transparent;font-size:.82rem;position:relative}
.char-card:hover{border-color:#e94560}
.char-card.active{border-color:#e94560;background:#1a1a4e}
.char-card .name{font-weight:bold;display:flex;justify-content:space-between;align-items:center}
.char-card .traits{font-size:.7rem;color:#aaa;margin-top:3px}
.char-card .mood{display:inline-block;margin-top:4px;font-size:.68rem;padding:1px 6px;border-radius:8px}
.char-card .interact-btn{position:absolute;top:4px;right:6px;font-size:.75rem;background:rgba(233,69,96,.2);color:#e94560;border:1px solid rgba(233,69,96,.3);border-radius:4px;padding:1px 7px;cursor:pointer;opacity:0;transition:opacity .15s}
.char-card:hover .interact-btn{opacity:1}
.section-label{font-size:.7rem;color:#555;text-transform:uppercase;letter-spacing:.05em;margin-top:6px;padding:2px 0}
.side-btn{width:100%;padding:7px;border-radius:6px;border:1px solid #345;background:rgba(255,255,255,.04);color:#ccc;font-size:.78rem;cursor:pointer;text-align:center;transition:all .15s}
.side-btn:hover{background:rgba(233,69,96,.12);border-color:#e94560;color:#e94560}
.side-btn.guide-btn{border-color:rgba(26,188,156,.3);color:#1abc9c}
.side-btn.guide-btn:hover{background:rgba(26,188,156,.12);border-color:#1abc9c}
.mood-happy{background:#2ecc71;color:#000}
.mood-neutral{background:#f1c40f;color:#000}
.mood-sad{background:#3498db;color:#fff}
.mood-angry{background:#e74c3c;color:#fff}
.mood-tired{background:#95a5a6;color:#000}
#main{flex:1;display:flex;flex-direction:column;overflow-y:auto;max-height:100vh}
#header{background:#16213e;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #233}
#header h1{font-size:1.2rem}
#date-display{font-size:.75rem;color:#888}
#clock{font-size:1.5rem;font-weight:bold;color:#e94560;font-variant-numeric:tabular-nums}
#feed{flex:1;overflow-y:auto;padding:14px 20px;display:flex;flex-direction:column;gap:10px}
.action-card{background:#16213e;border-radius:10px;padding:10px 14px;cursor:pointer;transition:all .15s;border-left:3px solid #233;font-size:.85rem}
.action-card:hover{background:#1a1a4e;border-left-color:#e94560}
.action-card.player-action{border-left-color:#9b59b6}
.action-card.guided-action{border-left-color:#1abc9c}
.action-card.event-action{border-left-color:#e67e22}
.action-card .time-stamp{font-size:.7rem;color:#888;margin-bottom:4px}
.action-card .action-text{line-height:1.5}
.action-card .action-tag{font-size:.65rem;padding:1px 5px;border-radius:3px;margin-left:4px}
.tag-player{background:rgba(155,89,182,.2);color:#9b59b6}
.tag-guided{background:rgba(26,188,156,.2);color:#1abc9c}
.tag-event{background:rgba(230,126,34,.2);color:#e67e22}
.tag-interact{background:rgba(52,152,219,.2);color:#3498db}
.story-panel{background:#0f3460;border-radius:10px;padding:14px 18px;margin-top:6px;line-height:1.75;font-size:.83rem;border:1px solid #e94560;display:none}
.story-panel.show{display:block}
.story-panel strong{color:#e94560}
#controls{padding:10px 20px;background:#16213e;border-top:1px solid #233;display:flex;gap:10px;align-items:center;flex-wrap:wrap;font-size:.78rem}
button{background:#e94560;color:#fff;border:none;padding:7px 16px;border-radius:6px;cursor:pointer;font-size:.8rem;transition:opacity .15s}
button:hover{opacity:.8}
button.gray{background:#555}
button.purple{background:#9b59b6}
button.teal{background:#1abc9c;color:#000}
input,select,textarea{background:#0f3460;border:1px solid #345;color:#ddd;padding:6px 10px;border-radius:6px;font-size:.82rem}
input::placeholder{color:#666} textarea::placeholder{color:#555}
textarea{resize:vertical;min-height:50px}
.dialog-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:10;display:none}
.dialog-overlay.show{display:flex}
.dialog-box{background:#16213e;border-radius:12px;padding:20px;min-width:340px;max-width:520px;display:flex;flex-direction:column;gap:12px;max-height:85vh;overflow-y:auto}
.dialog-box h3{color:#e94560;font-size:.95rem}
.dialog-box .row{display:flex;gap:8px;align-items:center}
.dialog-box .row label{min-width:55px;font-size:.8rem;color:#aaa}
.dialog-box .char-chip{display:inline-block;padding:4px 10px;border-radius:6px;border:2px solid #345;cursor:pointer;font-size:.78rem;transition:all .15s}
.dialog-box .char-chip:hover{border-color:#e94560}
.dialog-box .char-chip.selected{border-color:#e94560;background:rgba(233,69,96,.2)}
.theme-chips{display:flex;flex-wrap:wrap;gap:6px}
.theme-chip{padding:5px 12px;border-radius:8px;border:2px solid #345;cursor:pointer;font-size:.78rem;transition:all .15s}
.theme-chip:hover{border-color:#1abc9c}
.theme-chip.selected{border-color:#1abc9c;background:rgba(26,188,156,.15)}
.char-info-mini{background:#0f3460;border-radius:8px;padding:8px 10px;margin-bottom:4px;font-size:.78rem}
.result-box{background:#0f3460;border-radius:8px;padding:12px;line-height:1.8;font-size:.82rem;display:none;max-height:300px;overflow-y:auto}
.result-box.show{display:block}
</style>
</head>
<body>

<div id="sidebar">
  <h2>🏘️ 稻羽居民</h2>
  <div id="char-list"></div>
  <div class="section-label">玩家操作</div>
  <button class="side-btn guide-btn" id="btn-guide">🎭 引导角色互动</button>
  <button class="side-btn" id="btn-add-char" style="margin-top:2px">+ 添加角色</button>
  <div style="margin-top:auto;font-size:.65rem;color:#444;text-align:center;padding:8px 0">
    左键角色=筛选<br>右键角色=删除<br>悬停=💬 互动
  </div>
</div>

<div id="main">
  <div id="header">
    <div>
      <h1>🕰️ 稻羽日常</h1>
      <div id="date-display"></div>
    </div>
    <div id="clock">00:00</div>
  </div>

  <div id="feed">
    <div style="text-align:center;color:#555;padding:60px 20px">
      🌅 角色们正在稻羽生活……<br>
      <small>每 30 秒自动一幕 · 点击行动卡片展开文章 · 侧边栏引导互动 · 卡片悬停右上角 💬 玩家互动</small>
    </div>
  </div>

  <div id="controls">
    <span>⚡ 自动演进中（每30秒）</span>
    <button id="btn-speed" class="gray" style="margin-left:auto">⏩ 快进×5</button>
    <button id="btn-reset" class="gray">🔄 重置</button>
  </div>
</div>

<!-- 引导互动弹窗 -->
<div class="dialog-overlay" id="dialog-guide">
  <div class="dialog-box">
    <h3>🎭 引导角色互动</h3>
    <p style="font-size:.75rem;color:#777">选定两个角色和一个互动主题，将推动他们之间发生一段故事。故事会记录在行动日志中，并影响角色心情。</p>
    <div class="row"><label>角色 A</label><div id="guide-char-a" style="display:flex;flex-wrap:wrap;gap:4px"></div></div>
    <div class="row"><label>角色 B</label><div id="guide-char-b" style="display:flex;flex-wrap:wrap;gap:4px"></div></div>
    <div class="row"><label>主题</label></div>
    <div class="theme-chips" id="guide-themes"></div>
    <div class="row" style="justify-content:flex-end;gap:8px">
      <button class="gray" id="btn-cancel-guide">取消</button>
      <button class="teal" id="btn-confirm-guide">✨ 让他们相遇</button>
    </div>
    <div class="result-box" id="guide-result"></div>
  </div>
</div>

<!-- 玩家互动弹窗 -->
<div class="dialog-overlay" id="dialog-player">
  <div class="dialog-box">
    <h3>💬 与角色互动</h3>
    <div id="player-char-info" class="char-info-mini"></div>
    <div class="row"><label>方式</label></div>
    <div class="theme-chips" id="player-actions"></div>
    <div class="row" id="player-custom-row" style="display:none">
      <label>内容</label><textarea id="player-custom-text" placeholder="你想说什么或做什么？"></textarea>
    </div>
    <div class="row" style="justify-content:flex-end;gap:8px">
      <button class="gray" id="btn-cancel-player">取消</button>
      <button class="purple" id="btn-confirm-player">💬 开始互动</button>
    </div>
    <div class="result-box" id="player-result"></div>
  </div>
</div>

<!-- 添加角色 -->
<div class="dialog-overlay" id="dialog-add">
  <div class="dialog-box">
    <h3>👤 添加新角色</h3>
    <div class="row"><label>名字</label><input id="new-name" placeholder="角色名" /></div>
    <div class="row"><label>性格</label><input id="new-traits" placeholder="用逗号分隔: 温柔, 固执, 好奇" /></div>
    <div class="row"><label>习性</label>
      <select id="new-routine"><option value="early">🌅 早起型</option><option value="normal" selected>🌤️ 普通</option><option value="night">🌙 夜猫子</option><option value="random">🎲 随机</option></select>
    </div>
    <div class="row" style="justify-content:flex-end;gap:8px">
      <button class="gray" id="btn-cancel-add">取消</button>
      <button id="btn-confirm-add">确认添加</button>
    </div>
  </div>
</div>

<script>
// =====================================================================
// 时钟
// =====================================================================
let gameTime = new Date();
function updateClock() {
  gameTime = new Date();
  document.getElementById('clock').textContent =
    String(gameTime.getHours()).padStart(2,'0')+':'+String(gameTime.getMinutes()).padStart(2,'0');
  const days = ['日','一','二','三','四','五','六'];
  document.getElementById('date-display').textContent =
    `${gameTime.getFullYear()}年${gameTime.getMonth()+1}月${gameTime.getDate()}日 星期${days[gameTime.getDay()]}`;
}
function getTimeLabel() {
  const h = gameTime.getHours();
  if (h<6) return '深夜'; if (h<9) return '清晨'; if (h<12) return '上午';
  if (h<14) return '午后'; if (h<18) return '傍晚'; if (h<22) return '夜晚';
  return '深夜';
}
function getWeather() {
  const r = Math.random();
  if (r<0.4) return '晴朗';
  if (r<0.6) return '多云';
  if (r<0.75) return '阴天';
  if (r<0.88) return '小雨';
  if (r<0.95) return '大雨';
  return '暴风雨';
}

// =====================================================================
// 角色系统
// =====================================================================
let characters = [];
let selectedCharId = null;
let actionLog = [];
let logIdCounter = 0;

const MOODS = ['happy','neutral','sad','angry','tired'];
const MOOD_LABELS = { happy:'😊 愉悦', neutral:'😐 平静', sad:'😢 低落', angry:'😠 烦躁', tired:'😴 疲惫' };
const MOOD_CLASSES = { happy:'mood-happy', neutral:'mood-neutral', sad:'mood-sad', angry:'mood-angry', tired:'mood-tired' };

function pick(arr) { return arr[Math.floor(Math.random()*arr.length)]; }
function pickWeighted(pairs) {
  let total = pairs.reduce((s,p)=>s+p[0],0), r = Math.random()*total;
  for (const [w,v] of pairs) { r-=w; if (r<=0) return v; }
  return pairs[pairs.length-1][1];
}

// =====================================================================
// 自动行动模板（按作息×时段×天气）
// =====================================================================
const SOLO_ACTIONS = {
  early: {
    清晨: ['早早起床，站在窗前看了会儿晨光','在厨房里安静地准备早餐','出门晨跑，空气里有露水的味道'],
    上午: ['精神饱满地处理今天要做的事','坐在书桌前写了些东西','在阳台上给植物浇了水'],
    午后: ['吃完午饭后有些困，在沙发上眯了一会','泡了一杯茶慢慢喝着','翻看手机上的消息，偶尔笑一下'],
    傍晚: ['看着窗外的夕阳发了会呆','收拾了一天的东西','在沙发上打了个盹，醒来时天已经暗了'],
    夜晚: ['已经准备要睡了，但灯还亮着','躺在床上翻了几页书','听了会安静的音乐'],
    深夜: ['睡得很沉','在梦中翻了个身','房间里只有微弱的呼吸声'],
  },
  normal: {
    清晨: ['被闹钟叫醒，赖了一会床','迷迷糊糊地刷了牙洗了脸','打开窗户看了看天气'],
    上午: ['开始处理今天的事务','回复了几条积攒的信息','出门买了点东西回来'],
    午后: ['感到一阵午后的倦意','随便吃了点东西当午饭','打开电视看了一会，没注意在演什么'],
    傍晚: ['准备做晚饭了','在屋里走来走去，想着什么','和在走廊里遇到的人打了个招呼'],
    夜晚: ['窝在沙发上看手机','打开了一本书，读了几页','回想着今天发生的事'],
    深夜: ['房间里还亮着一小盏灯','终于关灯躺了下来','在半梦半醒之间徘徊'],
  },
  night: {
    清晨: ['还在沉睡，窗帘拉得严严实实','房间里一片安静，夜色还没完全褪去','完全不知道天已经亮了'],
    上午: ['才刚醒过来，睡眼惺忪','打着哈欠从床上爬起来','灌了一杯咖啡才勉强清醒'],
    午后: ['精神终于好了一点','开始处理那些积压的事','坐在窗边晒了会太阳，感觉活过来了'],
    傍晚: ['反而精神了起来，这才是TA的时间','打开电脑开始工作','觉得晚上的空气更适合思考'],
    夜晚: ['全神贯注地沉浸在自己的世界里','在深夜获得了某种灵感','喝着热饮，享受这一段安静'],
    深夜: ['还醒着，灯光明亮','看着窗外漆黑的夜空','觉得世界在深夜里比白天更真实'],
  },
  random: {
    清晨: ['不知道什么时候就醒了，再也睡不着','在房间里漫无目的地走动','今天的心情有些难以捉摸'],
    上午: ['做了一些和计划完全无关的事','突发奇想改变了今天的安排','展现出了平时不为人知的一面'],
    午后: ['行为有些反常，在街上晃了很久','突然想去一个很久没去过的地方','在路边的长椅上坐了很久'],
    傍晚: ['心情变得有些复杂','一个人站在天桥上，看车流','想起了很久以前的事'],
    夜晚: ['无法入睡，脑子里全是各种念头','做了一些连自己都觉得莫名其妙的事','觉得夜晚的自己和平时的自己是两个人'],
    深夜: ['依然醒着，眼神很清醒','在黑暗中睁着眼睛，听一首歌','循环播放的那首歌已经不知道放了多少遍'],
  },
};

// 互动模板库
const INTERACTION_POOLS = {
  casual: [
    '{a}在走廊里遇到了{b}。{a}打了个招呼，{b}{b_resp}。两人简单聊了几句，各自走开的时候，{a}回头看了一眼。',
    '{a}和{b}在附近的小超市里偶遇了。{a}正在买{thing}，看到{b}之后犹豫了一下要不要上前。最后{b}先开了口。',
    '{a}给{b}发了一条消息，问了一个很日常的问题。{b}的回复让{a}{reaction}。这条消息{a}反复看了好几遍。',
  ],
  warm: [
    '{a}给{b}带了{thing}。"不是特地买的，就是刚好看到。"{a}说这话的时候没有看{b}。{b}接过来，{b_gift_reaction}。',
    '{a}看到{b}在{activity}，没有上前打扰，只是站在远处看了一会。{b}似乎感觉到了什么，回头看了一眼，{a}已经走开了。',
    '{a}今天主动去找了{b}。没说有什么事，只是安静地待在{b}旁边。{b}没有问为什么，也没有赶{a}走。两个人就这样待了一会。',
    '{a}和{b}一起{activity}。{outcome}。回去的路上，{a}哼了一小段歌，{b}在旁边听着，没有打断。',
  ],
  tense: [
    '{a}在{b}的门口徘徊了一阵。手抬起来又放下，最后还是{choice}。门里的{b}似乎听到了什么，但没有开门。',
    '{a}对{b}说了一句"你看起来不太好"。{b}{b_tense}。空气安静了几秒。{a}没有再追问，但也没有离开。',
    '{a}和{b}之间有某种没说出口的东西。今天在走廊里擦肩而过的时候，两个人都停了一下，然后又各自走了。',
  ],
  deep: [
    '{a}对{b}说了一句话，声音很轻："{deep_line}"。{b}过了很久才回答，声音也不大。周围很安静，只有远处的风声。',
    '{a}和{b}在{timeLabel}时分不期而遇。{a}看起来有心思，{b}没有问，只是安静地陪着走了一段很长的路。',
    '{a}在深夜给{b}发了一条很长的消息。{b}在凌晨才看到，读了好几遍。天亮时分，{b}回了一句很短的话。',
  ],
};

const INTERACTION_FILL = {
  thing: ['一杯热咖啡','一盒点心','一本旧书','一把伞','一张便条','一个橘子','一包零食','一支笔','一束路边摘的花','一个没用过的打火机'],
  activity: ['散了一次步','在河边坐了一会','一起去了一趟便利店','整理了一些旧东西','坐在台阶上看着天慢慢变暗'],
  outcome: ['气氛很轻松','谁都没怎么说话，但也不觉得尴尬','走的时候互相说了回头见','在路口分开的时候两个人都停了一下','约好了下次一起去另一个地方'],
  b_resp: ['笑了笑','点了下头','愣了一下然后说"真巧"','正在看手机，抬起头来','看起来像是刚从什么地方回来'],
  b_gift_reaction: ['愣了一秒，然后笑得眼角弯了','打开看了看，说"你怎么知道"','很轻地说了一声谢谢','拿在手里翻来覆去看了很久','没说什么，但收在了口袋里最近身的位置'],
  b_tense: ['转过头去，没有回答','说"我没事"，但声音出卖了TA','沉默了很久，然后叹了口气','看了{a}一眼，那个眼神里有太多东西'],
  deep_line: ['你对我来说不是任何人','我一直想问你一件事','你记不记得那天','我有时候觉得你不在这里','谢谢你，虽然不知道为什么'],
  choice: ['敲了门','没有敲，转身走了','在门口站了很久','透过窗户往里看了一眼','留下了一包东西在门口'],
};

function fillTemplate(tpl, a, b) {
  let s = tpl.replace('{a}',a.name).replace('{b}',b.name).replace('{timeLabel}',getTimeLabel());
  for (const [key, vals] of Object.entries(INTERACTION_FILL)) {
    while (s.includes('{'+key+'}')) s = s.replace('{'+key+'}', pick(vals));
  }
  s = s.replace('{reaction}', pick(['有些意外','心里一暖','觉得今天还不错','忍不住笑了','盯着屏幕看了很久','不知道该回什么','感到一种说不清的温柔']));
  return s;
}

function generateAutoInteraction(a, b) {
  // 根据双方心情选择模板池
  const bothGood = (a.mood==='happy'||b.mood==='happy') && !(a.mood==='angry'||b.mood==='angry');
  const anySad = a.mood==='sad'||b.mood==='sad';
  const anyAngry = a.mood==='angry'||b.mood==='angry';
  const isNight = getTimeLabel()==='深夜'||getTimeLabel()==='夜晚';

  let poolKey = 'casual';
  if (bothGood) poolKey = pickWeighted([[5,'warm'],[3,'casual'],[2,'deep']]);
  else if (anyAngry) poolKey = 'tense';
  else if (anySad) poolKey = pickWeighted([[4,'warm'],[3,'deep'],[3,'casual']]);
  else if (isNight) poolKey = pickWeighted([[5,'deep'],[3,'casual']]);

  return fillTemplate(pick(INTERACTION_POOLS[poolKey] || INTERACTION_POOLS.casual), a, b);
}

  if (!set) return '……';
  return (set[char.mood] || set.default || set[Object.keys(set)[0]])
    .replace(/\$\{n\}/g, n);
}

// =====================================================================
// 自动生成的故事
// =====================================================================
function generateAutoStory(actionText, chars) {
  const h = String(gameTime.getHours()).padStart(2,'0');
  const m = String(gameTime.getMinutes()).padStart(2,'0');
  const tLabel = getTimeLabel();
  const weather = getWeather();
  let story = `**${h}:${m} · ${tLabel} · ${weather}**\n\n`;

  if (chars.length === 1) {
    const c = chars[0];
    story += `${c.name}${actionText}。\n\n`;
    // 基于心情和性格的内心展开
    const trait = pick(c.traits);
    const moodDesc = {
      happy: `这一天${c.name}的心情不错。也许是因为${pick(['天气很好','昨晚睡得还行','收到了一条意料之外的消息','没什么特别的理由，就是感觉轻盈'])}。${trait}的性格让TA在这段时光里显得${pick(['格外生动','比平时柔和','不容易被外界打扰','很自在'])}。`,
      neutral: `${c.name}的状态很平稳。${pick(['没有特别想做的事，也没有特别不想做的','内心很平静，像一面没有风的湖','按部就班地过完了这段时间'])}。在某些人看来这叫无聊，但对于${c.name}来说，有时候无聊本身就是一种奢侈。`,
      sad: `有什么东西压在${c.name}心上。不大，但很重。${pick(['TA没有说出来','比平时更沉默','动作慢了好几拍'])}。${trait}的人在低落的时候往往${pick(['更不愿意打扰别人','把情绪收得很深','需要更长的时间才能走出来'])}。`,
      angry: `${c.name}有些烦躁。${pick(['血气往脑门上冲了几次','自己在跟自己较劲','看什么都不太顺眼'])}。${trait}的性格在这种时候让TA${pick(['更不愿意接受帮助','需要一点独处的时间','可能会说一些事后会后悔的话'])}。`,
      tired: `${c.name}真的很累了。不是身体上的累——虽然身体也累——是${pick(['那种连续好几天没睡好的倦','从骨子里渗出来的疲惫','做什么都提不起劲的感觉','一种积压了很久的消耗'])}。现在TA最需要的可能就是${pick(['一个没人打扰的下午','有人什么都不说地陪在边上','睡上很长很长的一觉'])}。`,
    };
    story += (moodDesc[c.mood] || moodDesc.neutral) + '\n\n';
    story += `这一天对${c.name}来说——${pick(['平淡但不算坏','有几个微小的闪光','和昨天差不多，但昨天其实也不差','到晚上回想的时候，会觉得是普通到会被忘记的一天。但有一瞬间，确实觉得还行'])}。`;
  } else {
    const [a, b] = chars;
    story += `${actionText}\n\n`;

    const chemKey = `${a.mood}-${b.mood}`;
    const chemistry = {
      'happy-happy': `两个心情都好的人碰到一起，气氛自然也不会差。${pick(['笑声比平时多了一点','谁都没说什么特别的话，但就是很舒服','像是有一小段阳光从云层里漏了出来'])}。`,
      'happy-sad': `${a.name}的好心情似乎感染了${b.name}——至少暂时如此。${b.name}的笑容里有一丝勉强，${a.name}察觉到了，但${a.name}没有追问。有时候不追问，就是最好的温柔。`,
      'sad-sad': `两个都有些低落的人相遇了。没有互相安慰，没有说"一切都会好起来的"。只是安静地存在于彼此的空间里。这种不需要说话的陪伴，有时候比任何语言都有效。`,
      'happy-angry': `${a.name}轻描淡写地带过了可能发生的冲突——不是不在意，而是觉得不值得。这种不在意反而让${b.name}的怒气在不知不觉中消了一些。`,
      'sad-happy': `${b.name}的好心情像一小束光照进了${a.name}的阴天里。${a.name}嘴上什么都没说，但内心某个很小的地方被照亮了一瞬。`,
      'tired-tired': `两个都累到骨子里的人。没有力气社交，没有力气假装。但这种"不用假装"本身就是某种解脱。`,
      'angry-sad': `${a.name}的怒气撞上了${b.name}的低落。两种截然不同的情绪在空气里僵持了几秒。然后${pick(['有人先退了一步','谁都没退，但也没再进一步','空气自己就软了下来'])}。`,
    };
    story += (chemistry[chemKey] || `两个人之间流动着一种微妙的氛围。${pick(['说不上好，也说不上不好','只是普通的日常','是只有他们之间才懂的默契','在外人看来也许不值一提，但在这一刻，确实有什么东西改变了'])}。`);

    story += `\n\n${pick([
      `这次相遇之后，${a.name}对${b.name}多了几分${pick(['理解','好奇','在意','说不清的东西'])}。`,
      `${b.name}回去之后想了一会。${pick(['不是想了什么具体的事，只是觉得和${a.name}在一起的时间还可以再长一点','想发条消息，写了删，删了写。最后没有发'])}。`,
      `没有人知道这段相遇意味着什么——也许什么都不意味。但${pick(['有些事的意义不在于结果，而在于它发生过','哪怕只是在对的时间遇到了对的人。不，哪怕只是遇到了'])}。`,
    ])}`;
  }
  return story;
}

// =====================================================================
// 角色操作
// =====================================================================
function createCharacter(name, traitsStr, routine) {
  const traits = traitsStr.split(/[,，、\s]+/).map(s=>s.trim()).filter(Boolean);
  if (traits.length===0) traits.push('普通');
  return { id:Date.now().toString(36)+Math.random().toString(36).slice(2,6), name, traits, routine, mood:'neutral', moodTimer:0 };
}

function deleteCharacter(id) {
  characters = characters.filter(c=>c.id!==id);
  if (selectedCharId===id) selectedCharId=null;
  renderChars(); renderFeed();
}

function initDefaultCharacters() {
  characters = [
    createCharacter('足立透', '懒散, 自嘲, 敏感, 嘴硬心软, 威士忌', 'night'),
    createCharacter('鸣上悠', '冷静, 可靠, 占有欲强, 难以读懂, 咖啡', 'normal'),
    createCharacter('田村', '乐天, 话多, 容易紧张, 崇拜悠', 'early'),
    createCharacter('堂岛辽太郎', '沉默, 责任感强, 笨拙关怀, 刑警', 'early'),
    createCharacter('雨宫莲', '低调, 敏锐, 正义感, 独处, 咖啡', 'night'),
  ];
  actionLog = []; logIdCounter = 0;
  characters[0].mood='neutral'; characters[1].mood='neutral';
  characters[2].mood='happy'; characters[3].mood='tired'; characters[4].mood='neutral';
}

// =====================================================================
// 世界演进
// =====================================================================
function tick() {
  // 心情轮换
  for (const c of characters) {
    c.moodTimer--;
    if (c.moodTimer<=0) {
      const pessimistic = c.traits.some(t=>/悲观|敏感|多愁善感/.test(t));
      const optimistic = c.traits.some(t=>/乐观|平和|乐天/.test(t));
      if (Math.random()<(pessimistic?.25:.12)) c.mood = pick(MOODS.filter(m=>m!==c.mood));
      else if (Math.random()<(optimistic?.20:.08)) c.mood = Math.random()<.6?'happy':'neutral';
      c.moodTimer = 3+Math.floor(Math.random()*8);
    }
  }
  if (characters.length===0) return;

  const tLabel = getTimeLabel();
  const isSleepTime = tLabel==='深夜';

  // 生成行动
  if (characters.length>=2 && Math.random()<0.4 && !isSleepTime) {
    const i1 = Math.floor(Math.random()*characters.length);
    let i2 = Math.floor(Math.random()*characters.length);
    while (i2===i1) i2=Math.floor(Math.random()*characters.length);
    const a=characters[i1], b=characters[i2];
    const actionText = generateAutoInteraction(a, b);
    actionLog.unshift({ id:++logIdCounter, time:new Date(gameTime), timeLabel:tLabel, type:'interaction', chars:[a.id,b.id], charNames:[a.name,b.name], actionText });
  } else {
    let active = characters;
    if (isSleepTime) active = characters.filter(c=>c.routine==='night'||c.routine==='random'?Math.random()<0.7:c.routine==='early'?Math.random()<0.15:Math.random()<0.3);
    if (active.length===0) active=[pick(characters)];
    const actor = pick(active);
    const patterns = SOLO_ACTIONS[actor.routine];
    const act = pick(patterns[tLabel] || patterns['午后']).replace('{name}', actor.name);
    actionLog.unshift({ id:++logIdCounter, time:new Date(gameTime), timeLabel:tLabel, type:'solo', chars:[actor.id], charNames:[actor.name], actionText:act });
  }
  if (actionLog.length>120) actionLog.length=120;

  // 随机事件
  if (Math.random()<0.06) {
    const c = pick(characters);
    const events = [
      `${c.name}收到了一封意外的信。发信人是多年未见的人。TA拿着信，站在门口看了很久，没有马上拆开。`,
      `${c.name}在街上碰到了一位很久没见的故人。两个人站在路边聊了很久，分开的时候，${c.name}回头看了好几次。`,
      `天气变了。${pick(['突然下起了大雨','风很大，吹得窗户作响','雾很重，什么都看不清'])}。${c.name}站在窗前，看了很久外面的世界。`,
      `${c.name}发现了${pick(['一本旧笔记','一张老照片','一个被遗忘在角落里的东西'])}。打开的时候，手指停了一下。`,
    ];
    c.mood = pick(MOODS.filter(m=>m!==c.mood));
    c.moodTimer = 4+Math.floor(Math.random()*6);
    actionLog.unshift({ id:++logIdCounter, time:new Date(gameTime), timeLabel:tLabel, type:'event', chars:[c.id], charNames:[c.name], actionText:pick(events) });
  }

  renderFeed(); renderChars();
}

// =====================================================================
// 渲染
// =====================================================================
function renderChars() {
  document.getElementById('char-list').innerHTML = characters.map(c => `
    <div class="char-card ${selectedCharId===c.id?'active':''}" onclick="selectChar('${c.id}')" oncontextmenu="event.preventDefault();deleteCharacter('${c.id}')">
      <button class="interact-btn" onclick="event.stopPropagation();openPlayerInteract('${c.id}')" title="与 ${c.name} 互动">💬</button>
      <div class="name">
        <span>${c.name}</span>
        <span style="font-size:.68rem;color:#666">${c.routine==='early'?'🌅':c.routine==='night'?'🌙':c.routine==='random'?'🎲':'🌤️'}</span>
      </div>
      <div class="traits">${c.traits.slice(0,2).join(' · ')}</div>
      <span class="mood ${MOOD_CLASSES[c.mood]}">${MOOD_LABELS[c.mood]}</span>
    </div>`).join('');
}

function selectChar(id) { selectedCharId = (selectedCharId===id)?null:id; renderChars(); renderFeed(); }

function renderFeed() {
  const el = document.getElementById('feed');
  let visible = actionLog;
  if (selectedCharId) visible = actionLog.filter(log=>log.chars.includes(selectedCharId));
  if (visible.length===0) {
    el.innerHTML = `<div style="text-align:center;color:#555;padding:60px 20px">
      ${selectedCharId?'这个角色还没有行动记录。等一会，或者去侧边栏互动。':'🌅 角色们正在稻羽生活……<br><small>每30秒自动一幕 · 点击卡片展开 · 侧边栏引导互动 · 悬停角色卡右上角 💬 玩家互动</small>'}
    </div>`; return;
  }

  el.innerHTML = visible.map(log=>{
    let cardCls='action-card', tag='', tagCls='';
    if (log.type==='player'){ cardCls+=' player-action'; tag='玩家'; tagCls='tag-player'; }
    else if (log.type==='guided'){ cardCls+=' guided-action'; tag='引导'; tagCls='tag-guided'; }
    else if (log.type==='event'){ cardCls+=' event-action'; tag='事件'; tagCls='tag-event'; }
    else if (log.type==='interaction'){ tag='互动'; tagCls='tag-interact'; }
    else { tag='行动'; }

    const typeLabel = log.type==='guided'?'🎭':log.type==='player'?'💬':log.type==='interaction'?'🤝':log.type==='event'?'⚡':'';
    return `<div class="${cardCls}" onclick="showStory(${log.id})">
      <div class="time-stamp">${formatTime(log.time)} · ${log.timeLabel} · ${typeLabel} ${tag?'<span class="action-tag '+tagCls+'">'+tag+'</span>':''}</div>
      <div class="action-text">${log.charNames.join(' & ')}：${log.actionText}</div>
    </div>
    <div class="story-panel" id="story-${log.id}"></div>`;
  }).join('');
}

function showStory(logId) {
  const log = actionLog.find(l=>l.id===logId); if (!log) return;
  const panel = document.getElementById(`story-${logId}`);
  if (panel.classList.contains('show')) { panel.classList.remove('show'); return; }
  document.querySelectorAll('.story-panel.show').forEach(p=>p.classList.remove('show'));

  let story;
  if (log.generatedStory) { story = log.generatedStory; }
  else {
    const involved = characters.filter(c=>log.chars.includes(c.id));
    story = generateAutoStory(log.actionText, involved);
  }
  panel.innerHTML = story.replace(/\n/g,'<br>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  panel.classList.add('show');
}

function formatTime(d) {
  return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}

// =====================================================================
// 引导互动面板逻辑
// =====================================================================
let guideCharA=null, guideCharB=null, guideTheme=null;

function openGuideDialog() {
  guideCharA=null; guideCharB=null; guideTheme=null;
  refreshGuideUI();
  document.getElementById('dialog-guide').classList.add('show');
}
function refreshGuideUI() {
  ['guide-char-a','guide-char-b'].forEach((elId,i)=>{
    const target = i===0?guideCharA:guideCharB;
    const which = i===0?'a':'b';
    document.getElementById(elId).innerHTML = characters.map(c =>
      `<span class="char-chip ${target===c.id?'selected':''}" onclick="pickGuideChar('${c.id}','${which}')">${c.name}</span>`).join('');
  });
  document.getElementById('guide-themes').innerHTML = GUIDE_THEMES.map(t =>
    `<span class="theme-chip ${guideTheme&&guideTheme.id===t.id?'selected':''}" onclick="guideTheme=GUIDE_THEMES.find(x=>x.id==='${t.id}');refreshGuideUI()" title="${t.icon}">${t.name}</span>`).join('');
  document.getElementById('guide-result').classList.remove('show'); document.getElementById('guide-result').innerHTML='';
}
function pickGuideChar(id,which){ if(which==='a')guideCharA=(guideCharA===id?null:id); else guideCharB=(guideCharB===id?null:id); refreshGuideUI(); }

function confirmGuide() {
  if (!guideCharA||!guideCharB) return alert('请选择两个角色');
  if (guideCharA===guideCharB) return alert('请选择两个不同的角色');
  if (!guideTheme) return alert('请选择一个互动主题');
  const a=characters.find(c=>c.id===guideCharA), b=characters.find(c=>c.id===guideCharB);
  if (!a||!b) return;
  const story = generateGuidedStory(a,b,guideTheme);
  document.getElementById('guide-result').innerHTML = story.replace(/\n/g,'<br>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  document.getElementById('guide-result').classList.add('show');
  actionLog.unshift({ id:++logIdCounter, time:new Date(gameTime), timeLabel:getTimeLabel(), type:'guided', chars:[a.id,b.id], charNames:[a.name,b.name], actionText:`[${guideTheme.name}] ${a.name} × ${b.name}`, generatedStory:story });
  a.mood=pick(MOODS); b.mood=pick(MOODS);
  renderFeed(); renderChars();
  guideCharA=null; guideCharB=null; guideTheme=null; refreshGuideUI();
}

// =====================================================================
// 玩家互动面板逻辑
// =====================================================================
let playerCharId=null, playerAction=null;

function openPlayerInteract(charId) {
  playerCharId=charId; playerAction=null;
  const c=characters.find(ch=>ch.id===charId); if (!c) return;
  document.getElementById('player-char-info').innerHTML=`<strong>${c.name}</strong> · ${c.traits.slice(0,3).join(', ')} · <span class="${MOOD_CLASSES[c.mood]}" style="display:inline-block;padding:1px 6px;border-radius:8px;font-size:.7rem">${MOOD_LABELS[c.mood]}</span>`;
  refreshPlayerUI();
  document.getElementById('player-result').classList.remove('show'); document.getElementById('player-result').innerHTML='';
  document.getElementById('dialog-player').classList.add('show');
}
function refreshPlayerUI() {
  document.getElementById('player-actions').innerHTML = PLAYER_ACTIONS.map(a =>
    `<span class="theme-chip ${playerAction&&playerAction.id===a.id?'selected':''}" onclick="pickPlayerAction('${a.id}')" title="${a.desc}">${a.name}</span>`).join('');
  document.getElementById('player-custom-row').style.display = (playerAction&&playerAction.custom)?'':'none';
}
function pickPlayerAction(id){ playerAction=PLAYER_ACTIONS.find(a=>a.id===id); refreshPlayerUI(); }

function confirmPlayer() {
  if (!playerCharId||!playerAction) return alert('请选择互动方式');
  const c=characters.find(ch=>ch.id===playerCharId); if (!c) return;
  const customText = document.getElementById('player-custom-text').value.trim();
  const story = generatePlayerStory(c,playerAction.id,customText);
  document.getElementById('player-result').innerHTML = story.replace(/\n/g,'<br>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  document.getElementById('player-result').classList.add('show');
  actionLog.unshift({ id:++logIdCounter, time:new Date(gameTime), timeLabel:getTimeLabel(), type:'player', chars:[c.id], charNames:[c.name], actionText:`[${playerAction.name}] ${customText||'(互动)'}`, generatedStory:story });
  c.mood = Math.random()<0.5 ? pick(MOODS) : c.mood;
  renderFeed(); renderChars();
  playerAction=null; document.getElementById('player-custom-text').value=''; refreshPlayerUI();
}

// =====================================================================
// 事件绑定
// =====================================================================
document.getElementById('btn-guide').addEventListener('click',openGuideDialog);
document.getElementById('btn-cancel-guide').addEventListener('click',()=>document.getElementById('dialog-guide').classList.remove('show'));
document.getElementById('btn-confirm-guide').addEventListener('click',confirmGuide);
document.getElementById('btn-add-char').addEventListener('click',()=>document.getElementById('dialog-add').classList.add('show'));
document.getElementById('btn-cancel-add').addEventListener('click',()=>document.getElementById('dialog-add').classList.remove('show'));
document.getElementById('btn-confirm-add').addEventListener('click',()=>{
  const n=document.getElementById('new-name').value.trim();
  if(!n) return alert('请输入名字');
  characters.push(createCharacter(n,document.getElementById('new-traits').value.trim()||'普通',document.getElementById('new-routine').value));
  document.getElementById('new-name').value=''; document.getElementById('new-traits').value='';
  document.getElementById('dialog-add').classList.remove('show'); renderChars();
});
document.getElementById('btn-cancel-player').addEventListener('click',()=>document.getElementById('dialog-player').classList.remove('show'));
document.getElementById('btn-confirm-player').addEventListener('click',confirmPlayer);
document.getElementById('btn-speed').addEventListener('click',()=>{for(let i=0;i<5;i++)tick();});
document.getElementById('btn-reset').addEventListener('click',()=>{if(confirm('确定重置？所有自定义角色将被清除。')){initDefaultCharacters();selectedCharId=null;renderChars();renderFeed();}});

// =====================================================================
// 启动
// =====================================================================
initDefaultCharacters(); renderChars(); renderFeed();
updateClock(); setInterval(updateClock,1000);
setInterval(tick,30000); tick(); // 立即生成第一批
</script>
